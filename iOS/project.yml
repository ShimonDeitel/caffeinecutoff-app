name: CaffeineCutoff
options:
  bundleIdPrefix: com.shimondeitel.caffcutoff
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CaffeineCutoff:
    type: application
    platform: iOS
    sources:
      - path: CaffeineCutoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.caffcutoff
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CaffeineCutoff/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CaffeineCutoffTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CaffeineCutoffTests
      - path: CaffeineCutoff.storekit
    dependencies:
      - target: CaffeineCutoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.caffcutoff.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CaffeineCutoffUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CaffeineCutoffUITests
    dependencies:
      - target: CaffeineCutoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.caffcutoff.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CaffeineCutoff:
    build:
      targets:
        CaffeineCutoff: all
        CaffeineCutoffTests: [test]
        CaffeineCutoffUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CaffeineCutoff.storekit
    test:
      config: Debug
      storeKitConfiguration: CaffeineCutoff.storekit
      targets:
        - CaffeineCutoffTests
        - CaffeineCutoffUITests
    archive:
      config: Release
